{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-hdd-stack fs-1 text-primary"></i>
                    <h4 class="mt-2">IT Asset Tracker</h4>
                    <p class="text-muted small">Asset Management System</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center small text-muted">
                    <p class="mb-1"><strong>Demo Credentials:</strong></p>
                    <p class="mb-0">Admin: admin / admin123</p>
                    <p>Engineer: engineer1 / eng123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
